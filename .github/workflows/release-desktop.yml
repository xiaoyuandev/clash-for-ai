name: Release Desktop

env:
  PNPM_VERSION: 10.32.1

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify-release-source:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tagged commit is on main
        run: |
          git fetch origin main --depth=1
          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tagged commit belongs to main."
          else
            echo "Release tags must point to a commit reachable from origin/main."
            exit 1
          fi

  release-desktop:
    needs: verify-release-source
    if: github.event_name == 'workflow_dispatch' || needs.verify-release-source.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac
          - os: windows-latest
            target: win
          - os: ubuntu-latest
            target: linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pnpm
        run: corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Show pnpm version
        run: pnpm --version

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: core/go.mod
          cache-dependency-path: core/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish desktop release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --filter desktop release:${{ matrix.target }}
